apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-config-pv

spec:
  persistentVolumeReclaimPolicy: Retain

  storageClassName: ""

  accessModes:
    - ReadWriteMany

  capacity:
    storage: 2Gi

  nfs:
    server: 192.168.1.13
    path: /mnt/apps/qbittorrent

  mountOptions:
    - nfsvers=4.1
    - noatime

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: qbittorrent-downloads-pv

spec:
  persistentVolumeReclaimPolicy: Retain

  storageClassName: ""

  accessModes:
    - ReadWriteMany

  capacity:
    storage: 100Gi

  nfs:
    server: 192.168.1.13
    path: /mnt/apps/qbittorrent/downloads

  mountOptions:
    - nfsvers=4.1
    - noatime