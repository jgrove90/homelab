apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-config-pvc
  namespace: utils

spec:
  accessModes:
    - ReadWriteMany

  resources:
    requests:
      storage: 2Gi

  volumeName: qbittorrent-config-pv

  storageClassName: ""

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qbittorrent-downloads-pvc
  namespace: utils

spec:
  accessModes:
    - ReadWriteMany

  resources:
    requests:
      storage: 100Gi

  volumeName: qbittorrent-downloads-pv

  storageClassName: ""