apiVersion: v1
kind: PersistentVolume

metadata:
  name: mealie-config-pv

spec:
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""

  accessModes:
    - ReadWriteOnce

  capacity:
    storage: 5Gi

  nfs:
    server: 192.168.1.13
    path: /mnt/apps/mealie

  mountOptions:
    - nfsvers=4.1
    - noatime