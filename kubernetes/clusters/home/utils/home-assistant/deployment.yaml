apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant
  namespace: utils

  labels:
    app: home-assistant

spec:
  replicas: 1

  selector:
    matchLabels:
      app: home-assistant

  template:
    metadata:
      labels:
        app: home-assistant

    spec:
      containers:
        - name: home-assistant
          image: ghcr.io/home-assistant/home-assistant:stable

          ports:
            - containerPort: 8123

          env:
            - name: TZ
              value: "America/Denver"

          volumeMounts:
            - name: config
              mountPath: /config

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi

          readinessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8123
            initialDelaySeconds: 60
            periodSeconds: 20

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: home-assistant-config-pvc