apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: database
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
--- 

apiVersion: v1
kind: Service
metadata:
  name: redis-external
  namespace: database
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
      nodePort: 30379
  type: NodePort