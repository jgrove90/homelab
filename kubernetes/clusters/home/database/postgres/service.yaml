apiVersion: v1
kind: Service
metadata:
  name: postgres-lb
  namespace: cnpg-system
spec:
  type: LoadBalancer

  loadBalancerIP: 192.168.1.139

  selector:
    cnpg.io/cluster: platform-db
    role: primary

  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
--- 

apiVersion: v1
kind: Service
metadata:
  name: immich-pg-lb
  namespace: cnpg-system
spec:
  type: LoadBalancer

  loadBalancerIP: 192.168.1.138

  selector:
    cnpg.io/cluster: immich-db
    role: primary

  ports:
    - name: immich
      port: 5432
      targetPort: 5432