apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: 10m

  chart:
    spec:
      chart: cloudnative-pg
      version: "0.28.3"
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system

  install:
    createNamespace: true
    remediation:
      retries: 3

  upgrade:
    remediation:
      retries: 3

  values: {}