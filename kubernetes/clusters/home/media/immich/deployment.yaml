apiVersion: apps/v1
kind: Deployment
metadata:
  name: immich
  namespace: media

  labels:
    app: immich

spec:
  replicas: 1

  selector:
    matchLabels:
      app: immich

  template:
    metadata:
      labels:
        app: immich

    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000

      containers:
        - name: immich
          image: ghcr.io/immich-app/immich-server:release

          ports:
            - containerPort: 2283

          env:
            - name: DB_HOSTNAME
              value: "postgres.postgres.svc.cluster.local"
            - name: DB_PORT
              value: "5432"

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: DB_USERNAME

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: DB_PASSWORD

            - name: DB_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: DB_DATABASE_NAME

            - name: REDIS_HOSTNAME
              value: "redis.redis.svc.cluster.local"

            - name: REDIS_PORT
              value: "6379"

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: immich-secret
                  key: JWT_SECRET

            - name: UPLOAD_LOCATION
              value: "/usr/src/app/upload"

          volumeMounts:
            - name: immich-data
              mountPath: /usr/src/app/upload

          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi

          readinessProbe:
            httpGet:
              path: /server-info/ping
              port: 2283
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /server-info/ping
              port: 2283
            initialDelaySeconds: 30
            periodSeconds: 15

      volumes:
        - name: immich-data
          persistentVolumeClaim:
            claimName: immich-data