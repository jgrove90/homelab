apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: infra
spec:
  interval: 24h

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: ingress-nginx
      version: "4.15.1"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: infra

  values:
    controller:
      service:
        type: LoadBalancer
        loadBalancerIP: 192.168.1.110