apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: infra

spec:
  interval: 24h

  chart:
    spec:
      chart: external-dns
      version: "1.21.1"

      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: infra

      interval: 24h

  values:
    provider: cloudflare

    cloudflare:
      proxied: false

    domainFilters:
      - alarlab.dev
      - packetsandpods.com

    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-key
            key: apiKey

    policy: upsert-only

    txtOwnerId: homelab

    sources:
      - ingress
      - service

    logLevel: info

    resources:
      requests:
        cpu: 50m
        memory: 64Mi

      limits:
        cpu: 250m
        memory: 256Mi

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true

    podSecurityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault