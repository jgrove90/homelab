apiVersion: v1
kind: PersistentVolume
metadata:
  name: prowlarr-pv

spec:
  persistentVolumeReclaimPolicy: Retain

  storageClassName: ""

  accessModes:
    - ReadWriteMany

  capacity:
    storage: 10Gi

  nfs:
    server: 192.168.1.13
    path: /mnt/apps/prowlarr

  mountOptions:
    - nfsvers=4.1
    - noatime