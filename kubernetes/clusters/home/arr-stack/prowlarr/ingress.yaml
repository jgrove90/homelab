apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prowlarr-ingress
  namespace: arr-stack
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10g"
    
spec:
  ingressClassName: nginx

  rules:
    - host: prowlarr.home
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prowlarr
                port:
                  number: 9696