apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: arr-stack
  labels:
    app: sonarr

spec:
  replicas: 1

  selector:
    matchLabels:
      app: sonarr

  template:
    metadata:
      labels:
        app: sonarr

    spec:
      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:4.0.17

          ports:
            - name: http
              containerPort: 8989

          env:
            - name: PUID
              value: "1000"

            - name: PGID
              value: "1000"

            - name: TZ
              value: "America/Denver"

          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: "2"
              memory: 10Gi

          volumeMounts:
            - name: config
              mountPath: /config

            - name: tv-media
              mountPath: /tv-media

            - name: downloads
              mountPath: /downloads

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-pvc

        - name: tv-media
          persistentVolumeClaim:
            claimName: sonarr-tv-pvc

        - name: downloads
          persistentVolumeClaim:
            claimName: sonarr-downloads-pvc