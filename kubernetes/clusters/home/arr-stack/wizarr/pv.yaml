apiVersion: v1
kind: PersistentVolume
metadata:
  name: wizarr-config-pv

spec:
  persistentVolumeReclaimPolicy: Retain

  storageClassName: ""

  accessModes:
    - ReadWriteMany

  capacity:
    storage: 1Gi

  nfs:
    server: 192.168.1.13
    path: /mnt/apps/wizarr

  mountOptions:
    - nfsvers=4.1
    - noatime