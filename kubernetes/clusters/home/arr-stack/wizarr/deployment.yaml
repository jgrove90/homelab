apiVersion: apps/v1
kind: Deployment
metadata:
  name: wizarr
  namespace: arr-stack
  labels:
    app: wizarr

spec:
  replicas: 1

  selector:
    matchLabels:
      app: wizarr

  template:
    metadata:
      labels:
        app: wizarr

    spec:
      containers:
        - name: wizarr
          image: ghcr.io/wizarrrr/wizarr:v2026.4.0
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 5690

          env:
            - name: BASE_URL
              value: "https://plex-invite.alarlab.dev"

            - name: TZ
              value: "America/Denver"

            - name: PUID
              value: "1000"

            - name: PGID
              value: "1000"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 1Gi

          startupProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: config
              mountPath: /data/database

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: wizarr-config-pvc