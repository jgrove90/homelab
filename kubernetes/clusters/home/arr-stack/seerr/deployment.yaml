apiVersion: apps/v1
kind: Deployment
metadata:
  name: seerr
  namespace: arr-stack
  labels:
    app: seerr

spec:
  replicas: 1

  selector:
    matchLabels:
      app: seerr

  template:
    metadata:
      labels:
        app: seerr

    spec:
      containers:
        - name: seerr
          image: ghcr.io/seerr-team/seerr:v3.3
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 5055

          env:
            - name: TZ
              value: "America/Denver"

            - name: LOG_LEVEL
              value: "info"

          resources:
            requests:
              cpu: 100m
              memory: 256Mi

            limits:
              cpu: "1"
              memory: 1Gi

          startupProbe:
            httpGet:
              path: /api/v1/settings/public
              port: http
            periodSeconds: 10
            failureThreshold: 30

          readinessProbe:
            httpGet:
              path: /api/v1/settings/public
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /api/v1/settings/public
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5

          volumeMounts:
            - name: config
              mountPath: /app/config

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: seerr-config-pvc