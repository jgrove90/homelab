apiVersion: v1
kind: PersistentVolume
metadata:
  name: seerr-config-pv

spec:
  persistentVolumeReclaimPolicy: Retain

  storageClassName: ""

  accessModes:
    - ReadWriteMany

  capacity:
    storage: 5Gi

  nfs:
    server: 192.168.1.13
    path: /mnt/apps/overseerr
  mountOptions:
    - nfsvers=4.1
    - noatime